services:
  postgres:
    image: postgres:16-alpine
    container_name: cacsms-academy-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cacsmsacademy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cacsmsacademy}
      POSTGRES_DB: ${POSTGRES_DB:-cacsms_academy_db}
    volumes:
      - cacsms_academy_postgres_data:/var/lib/postgresql/data

volumes:
  cacsms_academy_postgres_data:
